<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">QuickSDFTool social preview</title>
  <desc id="desc">Workflow preview showing painted masks, generated SDF threshold map, and toon shader result.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#15181f"/>
      <stop offset="0.52" stop-color="#20252c"/>
      <stop offset="1" stop-color="#2f2b25"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#f6d365"/>
      <stop offset="1" stop-color="#fda085"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#75d7ff"/>
      <stop offset="1" stop-color="#8ef0c5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="64" y="56" width="1152" height="528" rx="28" fill="#11151b" opacity="0.72" stroke="#3d4652"/>

  <text x="104" y="132" fill="#ffffff" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">QuickSDFTool</text>
  <text x="108" y="176" fill="#cbd4df" font-family="Segoe UI, Arial, sans-serif" font-size="25">Paint toon-shadow masks in UE5. Generate SDF threshold maps for stylized rendering.</text>

  <g filter="url(#shadow)">
    <rect x="104" y="238" width="300" height="250" rx="14" fill="#f6f1e7"/>
    <rect x="434" y="238" width="300" height="250" rx="14" fill="#131820"/>
    <rect x="764" y="238" width="410" height="250" rx="14" fill="#e9ecef"/>
  </g>

  <text x="124" y="276" fill="#222831" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">1. Painted masks</text>
  <circle cx="252" cy="372" r="76" fill="#ffffff" stroke="#20242b" stroke-width="7"/>
  <path d="M252 296 C318 312 348 376 314 430 C285 478 210 470 185 417 C223 404 250 377 252 296Z" fill="#252a33"/>
  <path d="M182 356 C213 342 238 318 252 296" fill="none" stroke="#f36d5f" stroke-width="10" stroke-linecap="round"/>

  <text x="454" y="276" fill="#eef5ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">2. SDF threshold</text>
  <g transform="translate(476 314)">
    <rect width="216" height="136" rx="8" fill="#202733"/>
    <path d="M0 116 C46 94 65 72 96 74 C132 76 153 26 216 10 L216 136 L0 136Z" fill="url(#cyan)" opacity="0.98"/>
    <path d="M0 76 C50 56 78 43 111 48 C146 53 165 30 216 20" fill="none" stroke="#f8fbff" stroke-width="8" stroke-linecap="round"/>
    <path d="M0 100 C50 80 82 66 113 68 C146 70 166 42 216 31" fill="none" stroke="#f6d365" stroke-width="5" stroke-linecap="round" opacity="0.95"/>
    <path d="M0 54 C48 39 77 28 108 31 C143 35 165 15 216 7" fill="none" stroke="#f36d5f" stroke-width="5" stroke-linecap="round" opacity="0.85"/>
  </g>

  <text x="784" y="276" fill="#222831" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">3. Toon shader result</text>
  <g transform="translate(860 300)">
    <circle cx="110" cy="88" r="76" fill="#ffd5b8" stroke="#252a33" stroke-width="7"/>
    <path d="M111 12 C170 24 200 82 181 135 C162 185 91 186 58 144 C94 132 119 90 111 12Z" fill="#d18a74"/>
    <path d="M52 70 C85 18 144 4 180 48 C154 36 119 48 110 78 C94 108 73 116 45 103 C38 92 41 80 52 70Z" fill="#34313a"/>
    <circle cx="85" cy="88" r="7" fill="#252a33"/>
    <circle cx="137" cy="88" r="7" fill="#252a33"/>
    <path d="M92 128 C111 139 130 138 147 128" fill="none" stroke="#252a33" stroke-width="5" stroke-linecap="round"/>
  </g>

  <g fill="none" stroke="url(#gold)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M414 363 L424 363"/>
    <path d="M744 363 L754 363"/>
  </g>
  <g fill="url(#gold)">
    <path d="M420 343 L450 363 L420 383Z"/>
    <path d="M750 343 L780 363 L750 383Z"/>
  </g>

  <text x="104" y="544" fill="#f7e7be" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="650">UE5 Editor Mode · Toon / Cel Shading · SDF Threshold Map Authoring</text>
</svg>
